name: Security Audit

on:
  push:
    branches: [master]
  schedule:
    - cron: "0 3 * * 1"
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20.x
          cache: npm
      - run: npm ci --legacy-peer-deps
      - run: npm audit --audit-level moderate
        continue-on-error: true
